name: docker
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t aws-cost-optimizer-cli:ci .
      - name: Show image size
        run: docker images aws-cost-optimizer-cli:ci
      - name: Smoke test (mock mode, no AWS creds)
        run: docker run --rm aws-cost-optimizer-cli:ci --mock --output /tmp/report
